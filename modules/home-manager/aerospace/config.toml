# Aerospace — tiling window manager for macOS
# https://nikitabobko.github.io/AeroSpace/guide

start-at-login = true
after-login-command = []
on-focus-changed = ["move-mouse window-lazy-center"]
after-startup-command = [
  "exec-and-forget borders active_color=0xff00C0A3 inactive_color=0xff292e42 width=6.0 style=round",
]

# Normalizations
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Layout
default-root-container-layout = "tiles"
default-root-container-orientation = "auto"

# Workspace-to-monitor assignment
# Split workspaces across monitors (niri-like per-monitor workspaces)
# "main" = built-in/primary, "secondary" = any external monitor
[workspace-to-monitor-force-assignment]
1 = "main"
2 = "main"
3 = "main"
4 = "main"
5 = "main"
6 = "secondary"
7 = "secondary"
8 = "secondary"
9 = "secondary"

# Gaps
[gaps]
inner.horizontal = 6
inner.vertical = 6
outer.left = 6
outer.bottom = 6
outer.top = 6
outer.right = 6

# Option (Alt) as the WM modifier — matching Super key on Linux

[mode.main.binding]
# Spawn terminal (bash -l to pick up nix PATH)
alt-enter = "exec-and-forget bash -l -c @KITTY_HOME@"
alt-shift-enter = "exec-and-forget bash -l -c @KITTY_HERE@"

# Launcher
alt-d = "exec-and-forget open -a Raycast"

# Browser (new window)
alt-w = 'exec-and-forget open -na "Google Chrome" --args --new-window'

# Close window
alt-q = "close --quit-if-last-window"

# Layout controls
alt-slash = "layout tiles horizontal vertical"
alt-comma = "layout accordion horizontal vertical"
alt-f = "fullscreen"
alt-v = "join-with down"
alt-b = "join-with right"

# Focus
alt-h = "focus left"
alt-j = "focus down"
alt-k = "focus up"
alt-l = "focus right"

# Move windows
alt-shift-h = "move left"
alt-shift-j = "move down"
alt-shift-k = "move up"
alt-shift-l = "move right"

# Resize
alt-minus = "resize smart -50"
alt-equal = "resize smart +50"

# Workspaces
alt-1 = "workspace 1"
alt-2 = "workspace 2"
alt-3 = "workspace 3"
alt-4 = "workspace 4"
alt-5 = "workspace 5"
alt-6 = "workspace 6"
alt-7 = "workspace 7"
alt-8 = "workspace 8"
alt-9 = "workspace 9"

# Move window to workspace
alt-shift-1 = "move-node-to-workspace 1"
alt-shift-2 = "move-node-to-workspace 2"
alt-shift-3 = "move-node-to-workspace 3"
alt-shift-4 = "move-node-to-workspace 4"
alt-shift-5 = "move-node-to-workspace 5"
alt-shift-6 = "move-node-to-workspace 6"
alt-shift-7 = "move-node-to-workspace 7"
alt-shift-8 = "move-node-to-workspace 8"
alt-shift-9 = "move-node-to-workspace 9"

# Focus monitor (matches niri Mod+Ctrl+H/J/K/L)
alt-ctrl-h = "focus-monitor left"
alt-ctrl-j = "focus-monitor down"
alt-ctrl-k = "focus-monitor up"
alt-ctrl-l = "focus-monitor right"

# Move window to monitor (matches niri Mod+Shift+Ctrl+H/J/K/L)
alt-shift-ctrl-h = "move-node-to-monitor --focus-follows-window left"
alt-shift-ctrl-j = "move-node-to-monitor --focus-follows-window down"
alt-shift-ctrl-k = "move-node-to-monitor --focus-follows-window up"
alt-shift-ctrl-l = "move-node-to-monitor --focus-follows-window right"

# Move entire workspace to another monitor
alt-shift-ctrl-u = "move-workspace-to-monitor --wrap-around next"

# Floating
alt-t = "layout floating tiling"

# Reload config
alt-shift-r = "reload-config"

# Join / split
alt-shift-space = "layout tiles horizontal vertical"
